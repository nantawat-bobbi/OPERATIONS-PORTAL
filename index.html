<!DOCTYPE html>
<html lang="th">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Laliza Operations Portal
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    body{
      background:#f5f7fb;
      color:#111827;
    }

    .app{

      min-height:100vh;

      display:grid;

      grid-template-columns:
        260px 1fr;
    }

    /* =========================
       SIDEBAR
    ========================= */

    .sidebar{

      background:#111827;

      color:#fff;

      padding:24px;

      display:flex;

      flex-direction:column;

      gap:18px;
    }

    .logo{

      font-size:24px;

      font-weight:700;

      margin-bottom:12px;
    }

    .menu{

      display:flex;

      flex-direction:column;

      gap:12px;
    }

    .menu button{

      height:46px;

      border:none;

      border-radius:14px;

      background:#1f2937;

      color:#fff;

      cursor:pointer;

      font-size:15px;

      font-weight:600;

      text-align:left;

      padding:0 16px;

      transition:0.2s;
    }

    .menu button:hover{

      background:#374151;
    }

    .menu button.active{

      background:#4f46e5;
    }

    /* =========================
       MAIN
    ========================= */

    .main{

      padding:28px;
    }

    .topbar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:28px;
    }

    .title-wrap small{

      color:#64748b;

      letter-spacing:2px;

      font-size:12px;
    }

    .title-wrap h1{

      margin-top:6px;

      font-size:34px;

      font-weight:700;
    }

    .save-btn{

      height:48px;

      padding:0 22px;

      border:none;

      border-radius:14px;

      background:#4f46e5;

      color:#fff;

      font-size:15px;

      font-weight:600;

      cursor:pointer;
    }

    /* =========================
       SUMMARY
    ========================= */

    .summary{

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(220px,1fr));

      gap:18px;

      margin-bottom:28px;
    }

    .summary-card{

      background:#fff;

      border-radius:20px;

      padding:22px;

      border:1px solid #e5e7eb;
    }

    .summary-card small{

      color:#64748b;

      font-size:13px;
    }

    .summary-card h2{

      margin-top:10px;

      font-size:30px;

      font-weight:700;
    }

    /* =========================
       FORM
    ========================= */

    .form-section{

      background:#fff;

      border-radius:22px;

      padding:24px;

      margin-bottom:24px;

      border:1px solid #e5e7eb;
    }

    .form-section h3{

      margin-bottom:22px;

      font-size:22px;
    }

    .grid{

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(220px,1fr));

      gap:18px;
    }

    .field{

      display:flex;

      flex-direction:column;

      gap:8px;
    }

    .field label{

      font-size:14px;

      color:#64748b;
    }

    .field input{

      height:46px;

      border:1px solid #dbe2ea;

      border-radius:14px;

      padding:0 14px;

      font-size:15px;
    }

    /* =========================
       MOBILE
    ========================= */

    @media(max-width:900px){

      .app{

        grid-template-columns:1fr;
      }

      .sidebar{

        flex-direction:row;

        overflow:auto;
      }

      .menu{

        flex-direction:row;
      }

      .menu button{

        min-width:180px;
      }

    }

  </style>

</head>

<body>

  <div class="app">

    <!-- =====================
         SIDEBAR
    ====================== -->

    <aside class="sidebar">

      <div class="logo">
        LALIZA
      </div>

      <div class="menu">

        <button class="active">
          📊 Operations
        </button>

        <button>
          👩‍💼 HR
        </button>

        <button>
          🩺 Doctor
        </button>

        <button>
          📈 Analytics
        </button>

      </div>

    </aside>

    <!-- =====================
         MAIN
    ====================== -->

    <main class="main">

      <div class="topbar">

        <div class="title-wrap">

          <small>
            DAILY OPERATIONS
          </small>

          <h1>
            Operations Portal
          </h1>

        </div>

        <button class="save-btn">
          Save Daily Report
        </button>

      </div>

      <!-- =====================
           SUMMARY
      ====================== -->

      <div class="summary">

        <div class="summary-card">

          <small>
            Revenue Today
          </small>

          <h2>
            ฿0
          </h2>

        </div>

        <div class="summary-card">

          <small>
            Leads
          </small>

          <h2>
            0
          </h2>

        </div>

        <div class="summary-card">

          <small>
            Customers
          </small>

          <h2>
            0
          </h2>

        </div>

      </div>

      <!-- =====================
           SALES
      ====================== -->

      <div class="form-section">

        <h3>
          Sales
        </h3>

        <div class="grid">

          <div class="field">
            <label>ยอดขายรวม</label>
            <input type="text">
          </div>

          <div class="field">
            <label>เงินสด</label>
            <input type="text">
          </div>

          <div class="field">
            <label>ยอดโอน</label>
            <input type="text">
          </div>

          <div class="field">
            <label>คอร์ส</label>
            <input type="text">
          </div>

          <div class="field">
            <label>สินค้า</label>
            <input type="text">
          </div>

        </div>

      </div>

      <!-- =====================
           MARKETING
      ====================== -->

      <div class="form-section">

        <h3>
          Marketing
        </h3>

        <div class="grid">

          <div class="field">
            <label>FB Leads</label>
            <input type="text">
          </div>

          <div class="field">
            <label>LINE Leads</label>
            <input type="text">
          </div>

          <div class="field">
            <label>TikTok Leads</label>
            <input type="text">
          </div>

          <div class="field">
            <label>Ads Spend</label>
            <input type="text">
          </div>

          <div class="field">
            <label>Campaign</label>
            <input type="text">
          </div>

        </div>

      </div>

      <!-- =====================
           HR
      ====================== -->

      <div class="form-section">

        <h3>
          HR
        </h3>

        <div class="grid">

          <div class="field">
            <label>พนักงานเข้างาน</label>
            <input type="text">
          </div>

          <div class="field">
            <label>ลางาน</label>
            <input type="text">
          </div>

          <div class="field">
            <label>มาสาย</label>
            <input type="text">
          </div>

          <div class="field">
            <label>OT</label>
            <input type="text">
          </div>

        </div>

      </div>

    </main>

  </div>

</body>
</html>
