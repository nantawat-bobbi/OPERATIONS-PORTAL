<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LALIZA Operations Portal</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

/* =========================================
   RESET
========================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#F4F7FB;
  color:#0F172A;
}

/* =========================================
   APP LAYOUT
========================================= */

.app{

  display:grid;

  grid-template-columns:
    260px 1fr;

  min-height:100vh;
}

/* =========================================
   SIDEBAR
========================================= */

.sidebar{

  background:#0F172A;

  color:#fff;

  padding:24px;
}

.logo{

  font-size:28px;
  font-weight:800;

  margin-bottom:32px;
}

.nav{

  display:flex;
  flex-direction:column;
  gap:12px;
}

.nav button{

  border:none;

  background:transparent;

  color:#CBD5E1;

  height:48px;

  border-radius:14px;

  text-align:left;

  padding:0 16px;

  font-size:15px;

  font-weight:600;

  cursor:pointer;

  transition:0.2s;
}

.nav button:hover{

  background:#1E293B;
}

.nav button.active{

  background:#5B5FF6;

  color:#fff;
}

/* =========================================
   MAIN
========================================= */

.main{

  padding:28px;
}

/* =========================================
   HEADER
========================================= */

.topbar{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:24px;
}

.header-left small{

  color:#64748B;

  letter-spacing:2px;

  font-size:12px;
}

.header-left h1{

  margin-top:6px;

  font-size:36px;

  font-weight:800;
}

.save-btn{

  height:48px;

  padding:0 24px;

  border:none;

  border-radius:16px;

  background:#5B5FF6;

  color:#fff;

  font-weight:700;

  cursor:pointer;

  box-shadow:
    0 10px 30px rgba(91,95,246,0.2);
}

/* =========================================
   GRID
========================================= */

.content-grid{

  display:grid;

  grid-template-columns:
    1.2fr 420px;

  gap:24px;
}

/* =========================================
   CARD
========================================= */

.card{

  background:#fff;

  border-radius:24px;

  padding:24px;

  border:1px solid #E2E8F0;

  box-shadow:
    0 10px 30px rgba(15,23,42,0.04);
}

.card-title{

  font-size:20px;

  font-weight:800;

  margin-bottom:24px;
}

/* =========================================
   FORM
========================================= */

.form-grid{

  display:grid;

  grid-template-columns:
    repeat(2,1fr);

  gap:16px;
}

.field{

  display:flex;

  flex-direction:column;

  gap:8px;
}

.field label{

  font-size:13px;

  color:#64748B;

  font-weight:600;
}

.field input{

  height:48px;

  border:1px solid #CBD5E1;

  border-radius:14px;

  padding:0 14px;

  font-size:15px;

  transition:0.2s;
}

.field input:focus{

  outline:none;

  border-color:#5B5FF6;

  box-shadow:
    0 0 0 4px rgba(91,95,246,0.08);
}

/* =========================================
   SUMMARY
========================================= */

.summary{

  display:flex;

  flex-direction:column;

  gap:18px;
}

.summary-card{

  background:#F8FAFC;

  border-radius:20px;

  padding:22px;

  border:1px solid #E2E8F0;
}

.summary-label{

  font-size:13px;

  color:#64748B;

  font-weight:600;
}

.summary-value{

  margin-top:8px;

  font-size:34px;

  font-weight:800;
}

.summary-sub{

  margin-top:8px;

  font-size:13px;

  color:#64748B;
}

/* =========================================
   KPI
========================================= */

.kpi-grid{

  display:grid;

  grid-template-columns:
    repeat(2,1fr);

  gap:16px;

  margin-top:20px;
}

.kpi{

  background:#fff;

  border-radius:18px;

  padding:18px;

  border:1px solid #E2E8F0;
}

.kpi small{

  color:#64748B;

  font-size:12px;
}

.kpi h3{

  margin-top:8px;

  font-size:28px;

  font-weight:800;
}

/* =========================================
   RESPONSIVE
========================================= */

@media(max-width:1200px){

  .content-grid{

    grid-template-columns:1fr;
  }

}

@media(max-width:900px){

  .app{

    grid-template-columns:1fr;
  }

  .sidebar{

    display:none;
  }

  .form-grid{

    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>

<div class="app">

  <!-- ===================================
       SIDEBAR
  ==================================== -->

  <aside class="sidebar">

    <div class="logo">
      LALIZA
    </div>

    <div class="nav">

      <button class="active">
        📊 Daily Revenue
      </button>

      <button>
        ☎️ Confirm Tracking
      </button>

      <button>
        👨‍⚕️ Doctor Finance
      </button>

      <button>
        🧾 Billing KPI
      </button>

      <button>
        📈 Analytics
      </button>

      <button>
        📤 Export
      </button>

    </div>

  </aside>

  <!-- ===================================
       MAIN
  ==================================== -->

  <main class="main">

    <!-- ===============================
         HEADER
    ================================ -->

    <div class="topbar">

      <div class="header-left">

        <small>
          DAILY OPERATIONS
        </small>

        <h1>
          Revenue Operations
        </h1>

      </div>

      <button
        class="save-btn"
        onclick="saveData()"
      >
        Save Report
      </button>

    </div>

    <!-- ===============================
         CONTENT
    ================================ -->

    <div class="content-grid">

      <!-- ===========================
           FORM
      ============================ -->

      <div class="card">

        <div class="card-title">
          Daily Revenue Input
        </div>

        <div class="form-grid">

          <div class="field">
            <label>หัตถการ</label>
            <input
              id="procedureRevenue"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>ขายยา</label>
            <input
              id="medicineRevenue"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>Treatment</label>
            <input
              id="treatmentRevenue"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>สินค้า</label>
            <input
              id="productRevenue"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>Member</label>
            <input
              id="memberRevenue"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>HD Mall</label>
            <input
              id="hdMallRevenue"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>Gowabi</label>
            <input
              id="gowabiRevenue"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>รายได้อื่น</label>
            <input
              id="otherRevenue"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>คนไข้ใหม่</label>
            <input
              id="newPatients"
              type="number"
              value="0"
            />
          </div>

          <div class="field">
            <label>คนไข้เก่า</label>
            <input
              id="oldPatients"
              type="number"
              value="0"
            />
          </div>

        </div>

      </div>

      <!-- ===========================
           LIVE PREVIEW
      ============================ -->

      <div class="summary">

        <div class="summary-card">

          <div class="summary-label">
            Revenue Today
          </div>

          <div
            class="summary-value"
            id="previewTotalRevenue"
          >
            ฿0.00
          </div>

          <div class="summary-sub">
            Live preview summary
          </div>

        </div>

        <div class="kpi-grid">

          <div class="kpi">

            <small>
              New Patients
            </small>

            <h3 id="previewNewPatients">
              0
            </h3>

          </div>

          <div class="kpi">

            <small>
              Old Patients
            </small>

            <h3 id="previewOldPatients">
              0
            </h3>

          </div>

          <div class="kpi">

            <small>
              Total Patients
            </small>

            <h3 id="previewTotalPatients">
              0
            </h3>

          </div>

          <div class="kpi">

            <small>
              Avg Revenue / Patient
            </small>

            <h3 id="previewAvgRevenue">
              ฿0
            </h3>

          </div>

        </div>

      </div>

    </div>

  </main>

</div>

<script>

/* =====================================
   HELPERS
===================================== */

function toNumber(value){

  if(
    value === '' ||
    value === null ||
    value === undefined ||
    isNaN(Number(value))
  ){
    return 0;
  }

  return Number(value);

}

function money(value){

  return value.toLocaleString(
    'th-TH',
    {
      minimumFractionDigits:2,
      maximumFractionDigits:2
    }
  );

}

/* =====================================
   LIVE PREVIEW
===================================== */

function updatePreview(){

  const procedure =
    toNumber(
      document.getElementById('procedureRevenue').value
    );

  const medicine =
    toNumber(
      document.getElementById('medicineRevenue').value
    );

  const treatment =
    toNumber(
      document.getElementById('treatmentRevenue').value
    );

  const product =
    toNumber(
      document.getElementById('productRevenue').value
    );

  const member =
    toNumber(
      document.getElementById('memberRevenue').value
    );

  const hdMall =
    toNumber(
      document.getElementById('hdMallRevenue').value
    );

  const gowabi =
    toNumber(
      document.getElementById('gowabiRevenue').value
    );

  const other =
    toNumber(
      document.getElementById('otherRevenue').value
    );

  const newPatients =
    toNumber(
      document.getElementById('newPatients').value
    );

  const oldPatients =
    toNumber(
      document.getElementById('oldPatients').value
    );

  const totalRevenue =
      procedure
    + medicine
    + treatment
    + product
    + member
    + hdMall
    + gowabi
    + other;

  const totalPatients =
      newPatients
    + oldPatients;

  const avgRevenue =
    totalPatients > 0
      ? totalRevenue / totalPatients
      : 0;

  document.getElementById(
    'previewTotalRevenue'
  ).innerText =
    `฿${money(totalRevenue)}`;

  document.getElementById(
    'previewNewPatients'
  ).innerText =
    newPatients;

  document.getElementById(
    'previewOldPatients'
  ).innerText =
    oldPatients;

  document.getElementById(
    'previewTotalPatients'
  ).innerText =
    totalPatients;

  document.getElementById(
    'previewAvgRevenue'
  ).innerText =
    `฿${money(avgRevenue)}`;

}

/* =====================================
   AUTO BIND
===================================== */

document
  .querySelectorAll('input')
  .forEach(input => {

    input.addEventListener(
      'input',
      updatePreview
    );

  });

/* =====================================
   SAVE
===================================== */

function saveData(){

  const payload = {

    procedureRevenue:
      toNumber(
        document.getElementById('procedureRevenue').value
      ),

    medicineRevenue:
      toNumber(
        document.getElementById('medicineRevenue').value
      ),

    treatmentRevenue:
      toNumber(
        document.getElementById('treatmentRevenue').value
      ),

    productRevenue:
      toNumber(
        document.getElementById('productRevenue').value
      ),

    memberRevenue:
      toNumber(
        document.getElementById('memberRevenue').value
      ),

    hdMallRevenue:
      toNumber(
        document.getElementById('hdMallRevenue').value
      ),

    gowabiRevenue:
      toNumber(
        document.getElementById('gowabiRevenue').value
      ),

    otherRevenue:
      toNumber(
        document.getElementById('otherRevenue').value
      ),

    newPatients:
      toNumber(
        document.getElementById('newPatients').value
      ),

    oldPatients:
      toNumber(
        document.getElementById('oldPatients').value
      )

  };

  console.log(payload);

  alert('Saved Successfully');

}

updatePreview();

</script>

</body>
</html>
