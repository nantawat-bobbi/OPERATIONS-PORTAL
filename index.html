<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LALIZA Operations Portal V6</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-body: #F8FAFC; --bg-surface: #FFFFFF; --bg-sidebar: #0F172A;
    --text-main: #0F172A; --text-muted: #64748B; --border-light: #E2E8F0;
    --primary: #4F46E5; --primary-hover: #4338CA;
    --radius-md: 8px; --radius-lg: 12px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Inter', sans-serif; background:var(--bg-body); color:var(--text-main); }
  
  /* --- ซ่อนฟอร์มพรินต์ในโหมดหน้าจอปกติ --- */
  #printArea { display: none; }

  .app{ min-height:100vh; display:grid; grid-template-columns:250px 1fr; }
  .sidebar{ background:var(--bg-sidebar); color:#fff; padding:24px 16px; }
  .logo{ font-size:20px; font-weight:800; margin: 8px 12px 32px 12px; letter-spacing: 1px; }
  .nav{ display:flex; flex-direction:column; gap:6px; }
  .nav-btn{ 
    border:none; background:transparent; color:#94A3B8; height:40px; 
    border-radius:var(--radius-md); text-align:left; padding:0 12px; 
    font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; 
  }
  .nav-btn.active{ background:var(--primary); color:#fff; font-weight: 600; }
  
  .main{ padding:32px 40px; max-width: 1440px; margin: 0 auto; width: 100%; }
  
  /* --- โซนเลือกสาขาแบบใหม่ (Grid Buttons) --- */
  .top-section { margin-bottom: 24px; }
  .branch-grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 16px;
    margin-bottom: 24px;
  }
  .branch-btn {
    background: var(--bg-surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .branch-btn:hover { border-color: var(--primary); }
  .branch-btn.selected {
    background: #EEF2FF;
    border-color: var(--primary);
    color: var(--primary);
  }
  .branch-indicator {
    width: 10px; height: 10px; border-radius: 50%; background: #CBD5E1;
  }
  .branch-btn.selected .branch-indicator { background: var(--primary); }

  /* --- Context Bar (วันที่ & ปุ่มแอคชัน) --- */
  .context-bar { display:flex; justify-content: space-between; align-items:center; padding-bottom: 24px; border-bottom: 1px solid var(--border-light); margin-bottom: 24px; }
  .action-group { display: flex; gap: 12px; }
  .context-bar input[type="date"] { height:40px; border:1px solid var(--border-light); border-radius:var(--radius-md); padding:0 12px; font-size:14px; }
  
  .btn { height:40px; padding:0 20px; border:none; border-radius:var(--radius-md); font-size: 14px; font-weight:600; cursor:pointer; transition: 0.2s; }
  .btn-print { background: #fff; border: 1px solid var(--border-light); color: var(--text-main); }
  .btn-print:hover { background: #F1F5F9; }
  .btn-save { background:var(--primary); color:#fff; }
  .btn-save:hover { background:var(--primary-hover); }

  .content-grid{ display:grid; grid-template-columns:minmax(0, 1.5fr) 380px; gap:24px; align-items: start; }
  .card{ background:var(--bg-surface); border-radius:var(--radius-lg); padding:32px; border:1px solid var(--border-light); }
  .form-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:20px 16px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:13px; color:var(--text-muted); font-weight:500; }
  .field input{ height:42px; border:1px solid var(--border-light); border-radius:var(--radius-md); padding:0 12px; font-size:15px; }
  
  .summary-card{ background:var(--bg-surface); border-radius:var(--radius-lg); padding:28px; border:1px solid var(--border-light); margin-bottom: 16px;}
  .summary-value{ margin-top:12px; font-size:40px; font-weight:700; color:var(--text-main); }
  .kpi-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
  .kpi{ background:var(--bg-surface); border-radius:var(--radius-lg); padding:20px; border:1px solid var(--border-light); }

  /* =========================================
     PRINT STYLES (สำหรับตอนกด Print เท่านั้น)
  ========================================== */
  @media print {
    body * { visibility: hidden; } /* ซ่อน UI ทั้งหมด */
    #printArea, #printArea * { visibility: visible; } /* แสดงเฉพาะฟอร์ม */
    #printArea { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; font-family: 'Sarabun', sans-serif; }
    
    .print-header { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 20px; }
    .print-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    
    .print-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .print-table th, .print-table td { border: 1px solid #000; padding: 6px; font-size: 12px; }
    .print-table th { background: #f0f0f0; text-align: center; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">LALIZA</div>
    <div class="nav">
      <button class="nav-btn active" data-module="revenue">📊 Daily Revenue</button>
      <button class="nav-btn" data-module="confirm">☎️ Confirm Tracking</button>
      <button class="nav-btn" data-module="doctor">👨‍⚕️ Doctor Finance</button>
      <button class="nav-btn" data-module="billing">🧾 Billing KPI</button>
    </div>
  </aside>

  <main class="main">
    <div class="top-section">
      <h1 id="pageTitle" style="font-size: 28px; margin-bottom: 8px;">Daily Revenue</h1>
      <small style="color: #64748B;">เลื่อกสาขาเพื่อบันทึกข้อมูล</small>
      
      <div class="branch-grid-container" id="branchSelector">
        <button class="branch-btn selected" data-val="RAMA9"><div class="branch-indicator"></div>เซ็นทรัลพระราม 9</button>
        <button class="branch-btn" data-val="PINKLAO"><div class="branch-indicator"></div>เซ็นทรัลปิ่นเกล้า</button>
        <button class="branch-btn" data-val="BANGKAE"><div class="branch-indicator"></div>ซีคอนบางแค</button>
        <button class="branch-btn" data-val="FUTURE"><div class="branch-indicator"></div>ฟิวเจอร์พาร์ครังสิต</button>
        <button class="branch-btn" data-val="PROMENADE"><div class="branch-indicator"></div>เดอะพรอมานาด</button>
        <button class="branch-btn" data-val="NGAMWONGWAN"><div class="branch-indicator"></div>เดอะมอลล์งามวงศ์วาน</button>
        <button class="branch-btn" data-val="SRINAKARIN"><div class="branch-indicator"></div>ซีคอนศรีนครินทร์</button>
        <button class="branch-btn" data-val="WESTGATE"><div class="branch-indicator"></div>เซ็นทรัลเวสต์เกต</button>
      </div>
    </div>
    
    <div class="context-bar">
      <input type="date" id="globalDate" />
      <div class="action-group">
        <button class="btn btn-print" onclick="printReport()">🖨️ Print Form</button>
        <button class="btn btn-save" id="btnSave">Save Report</button>
      </div>
    </div>

    <div class="content-grid">
      <div class="card">
        <div id="moduleForm"></div>
      </div>
      <div class="summary">
        <div class="summary-card">
          <div style="font-size:13px; color:#64748B;">Live Preview</div>
          <div class="summary-value" id="previewMain">฿0.00</div>
        </div>
        <div class="kpi-grid" id="kpiGrid"></div>
      </div>
    </div>
  </main>
</div>

<div id="printArea">
  <div class="print-header">ใบสรุปยอดแคชเชียร์และบัตรเครดิต</div>
  <div class="print-info">
    <span>ประจำวันที่: <span id="printDate"></span></span>
    <span>สาขา: <span id="printBranch"></span></span>
  </div>
  <table class="print-table">
    <thead>
      <tr>
        <th>ยอดหน้าร้าน</th>
        <th>Program</th>
        <th>จำนวนเงิน</th>
        <th>ยอดหักบัตร</th>
        <th>เครดิต</th>
        <th>จำนวนเงิน</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td></td><td>หัตถการ</td><td id="pt-procedure" style="text-align: right;"></td>
        <td></td><td>KBANK</td><td></td>
      </tr>
      <tr>
        <td></td><td>Treatment</td><td id="pt-treatment" style="text-align: right;"></td>
        <td></td><td>KTC</td><td></td>
      </tr>
      <tr>
        <td></td><td>ขายยา</td><td id="pt-medicine" style="text-align: right;"></td>
        <td></td><td>SCB</td><td></td>
      </tr>
      <tr>
        <td></td><td>สินค้า</td><td id="pt-product" style="text-align: right;"></td>
        <td></td><td>โอนเงิน</td><td></td>
      </tr>
      <tr>
        <td colspan="2" style="text-align: right; font-weight: bold;">ยอดรวมสุทธิ</td>
        <td id="pt-total" style="text-align: right; font-weight: bold;"></td>
        <td colspan="3"></td>
      </tr>
    </tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY", authDomain: "YOUR_PROJECT.firebaseapp.com", projectId: "YOUR_PROJECT_ID"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentModule = 'revenue';
  let selectedBranch = 'RAMA9'; // ค่าเริ่มต้น
  let selectedBranchName = 'เซ็นทรัลพระราม 9';
  document.getElementById('globalDate').valueAsDate = new Date();

  const toNumber = (value) => (value === '' || isNaN(Number(value))) ? 0 : Number(value);
  const money = (value) => value.toLocaleString('th-TH', { minimumFractionDigits:2, maximumFractionDigits:2 });
  const getVal = (id) => document.getElementById(id)?.value;

  // จัดการปุ่มเลือกสาขา
  const branchBtns = document.querySelectorAll('.branch-btn');
  branchBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      branchBtns.forEach(b => b.classList.remove('selected'));
      e.currentTarget.classList.add('selected');
      selectedBranch = e.currentTarget.dataset.val;
      selectedBranchName = e.currentTarget.innerText;
    });
  });

  // นำทาง Sidebar
  const navBtns = document.querySelectorAll('.nav-btn');
  navBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      navBtns.forEach(b => b.classList.remove('active'));
      e.currentTarget.classList.add('active');
      currentModule = e.currentTarget.dataset.module;
      loadModule(currentModule);
    });
  });

  function loadModule(module) {
    if (module === 'revenue') renderRevenue();
    // (ฟังก์ชัน renderConfirm, renderDoctor, renderBilling ใช้รูปแบบเดียวกับ V5 ได้เลยครับ)
  }

  function bindInputs(callback) {
    document.querySelectorAll('#moduleForm input').forEach(input => { input.addEventListener('input', callback); });
  }

  function renderRevenue() {
    document.getElementById('moduleForm').innerHTML = `
      <div class="form-grid">
        <div class="field"><label>หัตถการ</label><input id="rev-procedure" type="number" value="0" /></div>
        <div class="field"><label>ขายยา</label><input id="rev-medicine" type="number" value="0" /></div>
        <div class="field"><label>Treatment</label><input id="rev-treatment" type="number" value="0" /></div>
        <div class="field"><label>สินค้า</label><input id="rev-product" type="number" value="0" /></div>
      </div>
    `;
    bindInputs(updateRevenuePreview);
    updateRevenuePreview();
  }

  function updateRevenuePreview() {
    const total = toNumber(getVal('rev-procedure')) + toNumber(getVal('rev-medicine')) + toNumber(getVal('rev-treatment')) + toNumber(getVal('rev-product'));
    document.getElementById('previewMain').innerText = `฿${money(total)}`;
    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi"><small>Procedure</small><h3>฿${money(toNumber(getVal('rev-procedure')))}</h3></div>
      <div class="kpi"><small>Treatment</small><h3>฿${money(toNumber(getVal('rev-treatment')))}</h3></div>
    `;
  }

  // ผูกฟังก์ชัน Print เข้า Window ให้ปุ่ม HTML มองเห็น
  window.printReport = function() {
    // 1. ดึงข้อมูลจากฟอร์มไปใส่ใน Template พรินต์
    document.getElementById('printDate').innerText = document.getElementById('globalDate').value;
    document.getElementById('printBranch').innerText = selectedBranchName;
    
    document.getElementById('pt-procedure').innerText = money(toNumber(getVal('rev-procedure')));
    document.getElementById('pt-treatment').innerText = money(toNumber(getVal('rev-treatment')));
    document.getElementById('pt-medicine').innerText = money(toNumber(getVal('rev-medicine')));
    document.getElementById('pt-product').innerText = money(toNumber(getVal('rev-product')));
    
    const total = toNumber(getVal('rev-procedure')) + toNumber(getVal('rev-medicine')) + toNumber(getVal('rev-treatment')) + toNumber(getVal('rev-product'));
    document.getElementById('pt-total').innerText = money(total);

    // 2. สั่งพรินต์ (เบราว์เซอร์จะซ่อนหน้าเว็บและแสดงแค่ #printArea ตาม CSS)
    window.print();
  }

  // Firebase Save (ตัดทอนให้กระชับ โครงสร้างเดียวกับ V5)
  document.getElementById('btnSave').addEventListener('click', async () => {
    const rawDate = getVal('globalDate');
    const docId = `${selectedBranch}_${rawDate.replace(/-/g, '')}`;
    if (currentModule === 'revenue') {
       // Save to Firebase logic...
       alert(`✅ บันทึกข้อมูลสาขา ${selectedBranchName} สำเร็จ!`);
    }
  });

  loadModule('revenue');
</script>
</body>
</html>
