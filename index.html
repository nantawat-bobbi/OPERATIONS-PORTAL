<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LALIZA OPERATIONS PORTAL</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
}

.hidden{
  display:none !important;
}

.login-screen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:320px;
  background:#fff;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.login-box h1{
  margin-top:0;
}

.login-box input,
.login-box button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.login-box button{
  background:#111827;
  color:#fff;
  border:none;
  cursor:pointer;
}

.main-app{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:240px;
  background:#111827;
  color:#fff;
  padding:20px;
}

.sidebar h2{
  margin-top:0;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.nav-btn.active{
  background:#2563eb;
  color:#fff;
}

.content{
  flex:1;
  padding:20px;
}

.tab-page{
  display:none;
}

.tab-page.active{
  display:block;
}

.toolbar{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.toolbar input,
.toolbar button{
  padding:12px;
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.card h3{
  margin:0;
  font-size:14px;
  color:#666;
}

.card .value{
  margin-top:10px;
  font-size:28px;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

th,td{
  border:1px solid #eee;
  padding:10px;
  text-align:center;
}

th{
  background:#111827;
  color:#fff;
}

input[type='number'],
input[readonly]{
  width:100%;
  padding:8px;
  border:1px solid #ddd;
  border-radius:8px;
}

canvas{
  background:#fff;
  padding:20px;
  border-radius:14px;
  margin-top:20px;
}
</style>
</head>
<body>

<div id="login-screen" class="login-screen">

  <div class="login-box">

    <h1>LALIZA CLINIC</h1>

    <input
      type="password"
      id="login-pass"
      placeholder="PIN"
      autocomplete="off"
    >

    <button id="loginBtn">
      เข้าสู่ระบบ
    </button>

  </div>

</div>

<div id="main-app" class="main-app hidden">

  <aside class="sidebar">

    <h2>LALIZA</h2>

    <button class="nav-btn active" data-tab="t1">
      Revenue
    </button>

    <button class="nav-btn" data-tab="t2">
      Dashboard
    </button>

    <button id="logoutBtn">
      Logout
    </button>

  </aside>

  <main class="content">

    <section id="t1" class="tab-page active">

      <div class="toolbar">

        <input type="month" id="monthPicker">

        <button id="downloadTemplateBtn">
          โหลดฟอร์ม Import
        </button>

        <input type="file" id="excelFile">

      </div>

      <div class="summary-grid">

        <div class="card">
          <h3>รวมรายได้</h3>
          <div class="value" id="dashboard-total">0</div>
        </div>

      </div>

      <table>

        <thead>
          <tr>
            <th>วัน</th>
            <th>หัตถการ</th>
            <th>ขายยา</th>
            <th>Treatment</th>
            <th>รวม</th>
          </tr>
        </thead>

        <tbody id="revenue-body"></tbody>

      </table>

    </section>

    <section id="t2" class="tab-page">

      <h2>Dashboard</h2>

      <canvas id="revenueChart"></canvas>

    </section>

  </main>

</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID"
};

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

const g = (id)=>document.getElementById(id);
const qsa = (s)=>document.querySelectorAll(s);

let revenueChart = null;

const USERS = {
  '16698': {
    role:'admin',
    name:'ADMIN'
  }
};

window.addEventListener(
  'DOMContentLoaded',
  bootstrapApp
);

function bootstrapApp(){

  try{

    bindEvents();

    restoreSession();

    buildRevenueTable();

    initRouter();

    console.log('APP READY');

  }catch(err){

    console.error(err);

  }

}

function bindEvents(){

  g('loginBtn')
  ?.addEventListener('click', login);

  g('logoutBtn')
  ?.addEventListener('click', logout);

  g('downloadTemplateBtn')
  ?.addEventListener(
    'click',
    downloadTemplate
  );

  g('excelFile')
  ?.addEventListener(
    'change',
    (e)=>importExcel(e.target.files[0])
  );

}

function login(){

  const pass =
  g('login-pass')
  .value
  .trim();

  if(!pass){
    alert('กรุณากรอกรหัส');
    return;
  }

  const user = USERS[pass];

  if(!user){
    alert('รหัสไม่ถูกต้อง');
    return;
  }

  sessionStorage.setItem(
    'lalizaUser',
    JSON.stringify(user)
  );

  enterApp();

}

function restoreSession(){

  const raw =
  sessionStorage.getItem(
    'lalizaUser'
  );

  if(!raw) return;

  enterApp();

}

function enterApp(){

  g('login-screen')
  .classList.add('hidden');

  g('main-app')
  .classList.remove('hidden');

}

function logout(){

  sessionStorage.removeItem(
    'lalizaUser'
  );

  location.reload();

}

function initRouter(){

  qsa('.nav-btn').forEach(btn=>{

    btn.addEventListener('click',()=>{

      const tab = btn.dataset.tab;

      switchTab(tab, btn);

    });

  });

}

function switchTab(tabId, btn){

  qsa('.tab-page').forEach(page=>{
    page.classList.remove('active');
  });

  qsa('.nav-btn').forEach(node=>{
    node.classList.remove('active');
  });

  g(tabId)?.classList.add('active');

  btn?.classList.add('active');

}

function buildRevenueTable(){

  const body = g('revenue-body');

  if(!body) return;

  body.innerHTML = '';

  for(let i=1;i<=31;i++){

    const day =
    String(i).padStart(2,'0');

    body.innerHTML += `
      <tr>

        <td>${day}</td>

        <td>
          <input
            type="number"
            id="procedure_${day}"
          >
        </td>

        <td>
          <input
            type="number"
            id="drug_${day}"
          >
        </td>

        <td>
          <input
            type="number"
            id="treatment_${day}"
          >
        </td>

        <td>
          <input
            type="text"
            id="sum_${day}"
            readonly
          >
        </td>

      </tr>
    `;

  }

  bindRevenueInputs();

}

function bindRevenueInputs(){

  for(let i=1;i<=31;i++){

    const day =
    String(i).padStart(2,'0');

    [
      `procedure_${day}`,
      `drug_${day}`,
      `treatment_${day}`
    ].forEach(id=>{

      g(id)?.addEventListener(
        'input',
        ()=>calculateRevenueRow(day)
      );

    });

  }

}

function num(v){
  return Number(v || 0);
}

function money(v){
  return Number(v || 0)
  .toLocaleString('th-TH');
}

function calculateRevenueRow(day){

  const total =
  num(g(`procedure_${day}`)?.value)
  + num(g(`drug_${day}`)?.value)
  + num(g(`treatment_${day}`)?.value);

  g(`sum_${day}`).value =
  money(total);

  saveRevenue(day, total);

  calculateDashboard();

}

function saveRevenue(day, total){

  const month =
  g('monthPicker').value;

  if(!month) return;

  db.ref(`revenue/${month}/${day}`)
  .set({ total });

}

function calculateDashboard(){

  let total = 0;

  for(let i=1;i<=31;i++){

    const day =
    String(i).padStart(2,'0');

    total += num(
      g(`sum_${day}`)
      ?.value
      ?.replace(/,/g,'')
    );

  }

  g('dashboard-total').innerText =
  money(total);

  renderChart(total);

}

function renderChart(total){

  const ctx =
  g('revenueChart');

  if(!ctx) return;

  if(!revenueChart){

    revenueChart = new Chart(ctx, {
      type:'bar',
      data:{
        labels:['Revenue'],
        datasets:[{
          label:'Total Revenue',
          data:[total]
        }]
      }
    });

  }else{

    revenueChart
    .data
    .datasets[0]
    .data = [total];

    revenueChart.update();

  }

}

function downloadTemplate(){

  const worksheet = XLSX.utils.json_to_sheet([
    {
      วันที่:'2026-01-01',
      หัตถการ:1000,
      ขายยา:500,
      Treatment:300
    }
  ]);

  const workbook = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    workbook,
    worksheet,
    'Revenue'
  );

  XLSX.writeFile(
    workbook,
    'Revenue-Import-Template.xlsx'
  );

}

function importExcel(file){

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){

    try{

      const data =
      new Uint8Array(e.target.result);

      const workbook = XLSX.read(data, {
        type:'array'
      });

      const sheetName =
      workbook.SheetNames[0];

      const sheet =
      workbook.Sheets[sheetName];

      const rows =
      XLSX.utils.sheet_to_json(sheet, {
        header:1
      });

      const headers = rows[0];

      const map = {};

      headers.forEach((h,i)=>{
        map[h] = i;
      });

      rows.slice(1).forEach(row=>{

        const rawDate =
        row[map['วันที่']];

        if(!rawDate) return;

        const parsed = new Date(rawDate);

        if(isNaN(parsed.getTime())) return;

        const day =
        String(parsed.getDate())
        .padStart(2,'0');

        const procedure =
        num(row[map['หัตถการ']]);

        const drug =
        num(row[map['ขายยา']]);

        const treatment =
        num(row[map['Treatment']]);

        g(`procedure_${day}`).value = procedure;
        g(`drug_${day}`).value = drug;
        g(`treatment_${day}`).value = treatment;

        calculateRevenueRow(day);

      });

      alert('Import Success');

    }catch(err){

      console.error(err);

      alert('Import Failed');

    }

  };

  reader.readAsArrayBuffer(file);

}

window.addEventListener(
  'error',
  (e)=>{
    console.error('GLOBAL ERROR', e.error);
  }
);

</script>

</body>
</html>
