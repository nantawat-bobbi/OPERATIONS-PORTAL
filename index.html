<script>

let currentModule = 'revenue';

/* ==============================
   SAFE NUMBER
============================== */

function toNumber(value){

  if(
    value === '' ||
    value === null ||
    value === undefined ||
    isNaN(Number(value))
  ){
    return 0;
  }

  return Number(value);

}

function money(value){

  return Number(value).toLocaleString(
    'th-TH',
    {
      minimumFractionDigits:2,
      maximumFractionDigits:2
    }
  );

}

/* ==============================
   NAVIGATION
============================== */

document
  .querySelectorAll('.nav-btn')
  .forEach(btn => {

    btn.addEventListener('click', () => {

      document
        .querySelectorAll('.nav-btn')
        .forEach(el => {
          el.classList.remove('active');
        });

      btn.classList.add('active');

      const module =
        btn.dataset.module;

      openModule(module);

    });

  });

/* ==============================
   OPEN MODULE
============================== */

function openModule(module){

  currentModule = module;

  switch(module){

    case 'revenue':
      renderRevenueModule();
      break;

    case 'confirm':
      renderConfirmModule();
      break;

    case 'doctor':
      renderDoctorModule();
      break;

    case 'billing':
      renderBillingModule();
      break;

  }

}

/* ==============================
   REVENUE
============================== */

function renderRevenueModule(){

  document.getElementById(
    'pageTitle'
  ).innerText =
    'Daily Revenue';

  document.getElementById(
    'formTitle'
  ).innerText =
    'Revenue Input';

  document.getElementById(
    'moduleForm'
  ).innerHTML = `

    <div class="form-grid">

      <div class="field">
        <label>หัตถการ</label>
        <input id="procedureRevenue" type="number" value="0">
      </div>

      <div class="field">
        <label>ขายยา</label>
        <input id="medicineRevenue" type="number" value="0">
      </div>

      <div class="field">
        <label>Treatment</label>
        <input id="treatmentRevenue" type="number" value="0">
      </div>

      <div class="field">
        <label>สินค้า</label>
        <input id="productRevenue" type="number" value="0">
      </div>

    </div>

  `;

  bindInputs(updateRevenuePreview);

  updateRevenuePreview();

}

/* ==============================
   CONFIRM
============================== */

function renderConfirmModule(){

  document.getElementById(
    'pageTitle'
  ).innerText =
    'Confirm Tracking';

  document.getElementById(
    'formTitle'
  ).innerText =
    'Call Center Tracking';

  document.getElementById(
    'moduleForm'
  ).innerHTML = `

    <div class="form-grid">

      <div class="field">
        <label>CF มา</label>
        <input id="confirmed" type="number" value="0">
      </div>

      <div class="field">
        <label>โทรทั้งหมด</label>
        <input id="totalcalls" type="number" value="0">
      </div>

    </div>

  `;

  bindInputs(updateConfirmPreview);

  updateConfirmPreview();

}

/* ==============================
   DOCTOR
============================== */

function renderDoctorModule(){

  document.getElementById(
    'pageTitle'
  ).innerText =
    'Doctor Finance';

  document.getElementById(
    'formTitle'
  ).innerText =
    'Doctor Settlement';

  document.getElementById(
    'moduleForm'
  ).innerHTML = `

    <div class="form-grid">

      <div class="field">
        <label>ยอดขาย</label>
        <input id="doctorRevenue" type="number" value="0">
      </div>

      <div class="field">
        <label>DF</label>
        <input id="doctorDF" type="number" value="0">
      </div>

    </div>

  `;

  bindInputs(updateDoctorPreview);

  updateDoctorPreview();

}

/* ==============================
   BILLING
============================== */

function renderBillingModule(){

  document.getElementById(
    'pageTitle'
  ).innerText =
    'Billing KPI';

  document.getElementById(
    'formTitle'
  ).innerText =
    'Billing Productivity';

  document.getElementById(
    'moduleForm'
  ).innerHTML = `

    <div class="form-grid">

      <div class="field">
        <label>จำนวนบิล</label>
        <input id="billCount" type="number" value="0">
      </div>

    </div>

  `;

  bindInputs(updateBillingPreview);

  updateBillingPreview();

}

/* ==============================
   INPUT BIND
============================== */

function bindInputs(callback){

  document
    .querySelectorAll('#moduleForm input')
    .forEach(input => {

      input.addEventListener(
        'input',
        callback
      );

    });

}

/* ==============================
   PREVIEW
============================== */

function updateRevenuePreview(){

  const total =
      toNumber(document.getElementById('procedureRevenue')?.value)
    + toNumber(document.getElementById('medicineRevenue')?.value)
    + toNumber(document.getElementById('treatmentRevenue')?.value)
    + toNumber(document.getElementById('productRevenue')?.value);

  document.getElementById(
    'previewMain'
  ).innerText =
    `฿${money(total)}`;

  document.getElementById(
    'previewSub'
  ).innerText =
    'Revenue Summary';

}

function updateConfirmPreview(){

  const confirmed =
    toNumber(document.getElementById('confirmed')?.value);

  const totalcalls =
    toNumber(document.getElementById('totalcalls')?.value);

  const rate =
    totalcalls > 0
      ? (confirmed / totalcalls) * 100
      : 0;

  document.getElementById(
    'previewMain'
  ).innerText =
    `${rate.toFixed(1)}%`;

  document.getElementById(
    'previewSub'
  ).innerText =
    'Show Rate';

}

function updateDoctorPreview(){

  const df =
    toNumber(document.getElementById('doctorDF')?.value);

  document.getElementById(
    'previewMain'
  ).innerText =
    `฿${money(df)}`;

  document.getElementById(
    'previewSub'
  ).innerText =
    'Doctor DF';

}

function updateBillingPreview(){

  const bills =
    toNumber(document.getElementById('billCount')?.value);

  document.getElementById(
    'previewMain'
  ).innerText =
    bills;

  document.getElementById(
    'previewSub'
  ).innerText =
    'Bills Today';

}

/* ==============================
   SAVE
============================== */

function saveData(){

  alert(
    currentModule + ' saved'
  );

}

/* ==============================
   INIT
============================== */

renderRevenueModule();

</script>
<div class="nav">

  <button class="nav-btn active" data-module="revenue">
    📊 Daily Revenue
  </button>

  <button class="nav-btn" data-module="confirm">
    ☎️ Confirm Tracking
  </button>

  <button class="nav-btn" data-module="doctor">
    👨‍⚕️ Doctor Finance
  </button>

  <button class="nav-btn" data-module="billing">
    🧾 Billing KPI
  </button>

</div>
