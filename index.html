<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LALIZA Operations Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-body: #F8FAFC;
    --bg-surface: #FFFFFF;
    --bg-sidebar: #0F172A;
    --text-main: #0F172A;
    --text-muted: #64748B;
    --text-light: #94A3B8;
    --border-light: #E2E8F0;
    --border-input: #CBD5E1;
    --primary: #4F46E5; /* Indigo 600 */
    --primary-hover: #4338CA;
    --primary-focus: rgba(79, 70, 229, 0.15);
    
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    
    --shadow-sm: 0 1px 2px 0 rgba(15, 23, 42, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.05);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Inter', sans-serif; background:var(--bg-body); color:var(--text-main); -webkit-font-smoothing: antialiased; }
  .app{ min-height:100vh; display:grid; grid-template-columns:250px 1fr; }
  
  /* SIDEBAR */
  .sidebar{ background:var(--bg-sidebar); color:#fff; padding:24px 16px; border-right:1px solid #1E293B; }
  .logo{ font-size:20px; font-weight:800; margin: 8px 12px 32px 12px; letter-spacing: 1px; color:#fff; }
  .nav{ display:flex; flex-direction:column; gap:6px; }
  .nav-btn{ 
    border:none; background:transparent; color:var(--text-light); height:40px; 
    border-radius:var(--radius-md); text-align:left; padding:0 12px; 
    font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; 
    display: flex; align-items: center; gap: 10px;
  }
  .nav-btn:hover{ background:#1E293B; color:#F8FAFC; }
  .nav-btn.active{ background:var(--primary); color:#fff; font-weight: 600; box-shadow: var(--shadow-sm); }
  
  /* MAIN */
  .main{ padding:32px 40px; max-width: 1440px; margin: 0 auto; width: 100%; }
  
  /* TOPBAR & CONTEXT BAR */
  .topbar{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:32px; padding-bottom: 24px; border-bottom: 1px solid var(--border-light); }
  .header-left small{ color:var(--text-muted); font-size:12px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
  .header-left h1{ margin-top:8px; font-size:28px; font-weight:700; letter-spacing:-0.02em; }
  
  .context-bar { display:flex; gap:12px; align-items:center; }
  .context-bar select, .context-bar input { 
    height:40px; border:1px solid var(--border-input); border-radius:var(--radius-md); 
    padding:0 12px; font-size:14px; background: var(--bg-surface); color:var(--text-main);
    box-shadow: var(--shadow-sm); cursor: pointer; transition: all 0.2s;
  }
  .context-bar select:focus, .context-bar input:focus { outline:none; border-color:var(--primary); box-shadow: 0 0 0 3px var(--primary-focus); }
  
  .save-btn{ 
    height:40px; padding:0 20px; border:none; border-radius:var(--radius-md); 
    background:var(--primary); color:#fff; font-size: 14px; font-weight:600; 
    cursor:pointer; box-shadow: var(--shadow-sm); transition: 0.2s; 
  }
  .save-btn:hover:not(:disabled) { background:var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .save-btn:disabled { background: #94A3B8; cursor: not-allowed; opacity: 0.7; }
  
  /* CONTENT GRID */
  .content-grid{ display:grid; grid-template-columns:minmax(0, 1.5fr) 380px; gap:24px; align-items: start; }
  
  /* CARDS */
  .card{ 
    background:var(--bg-surface); border-radius:var(--radius-lg); padding:32px; 
    border:1px solid var(--border-light); box-shadow:var(--shadow-sm); 
  }
  .card-title{ font-size:16px; font-weight:600; margin-bottom:24px; color:var(--text-main); display: flex; align-items: center; justify-content: space-between;}
  
  /* FORMS */
  .form-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:20px 16px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:13px; color:var(--text-muted); font-weight:500; }
  .field input{ 
    height:42px; border:1px solid var(--border-input); border-radius:var(--radius-md); 
    padding:0 12px; font-size:15px; color:var(--text-main); box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
  }
  .field input:focus{ outline:none; border-color:var(--primary); box-shadow: 0 0 0 3px var(--primary-focus); }
  .field input::placeholder { color: #CBD5E1; }
  
  /* SUMMARY & KPIS */
  .summary{ display:flex; flex-direction:column; gap:16px; position: sticky; top: 32px; }
  .summary-card{ 
    background:var(--bg-surface); border-radius:var(--radius-lg); padding:28px; 
    border:1px solid var(--border-light); box-shadow: var(--shadow-sm); 
  }
  .summary-label{ font-size:13px; color:var(--text-muted); font-weight:600; text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-value{ margin-top:12px; font-size:40px; font-weight:700; letter-spacing: -0.02em; color:var(--text-main); }
  .summary-sub{ margin-top:8px; color:var(--text-muted); font-size:13px; }
  
  .kpi-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
  .kpi{ background:var(--bg-surface); border-radius:var(--radius-lg); padding:20px; border:1px solid var(--border-light); box-shadow: var(--shadow-sm); }
  .kpi small{ color:var(--text-muted); font-size:13px; font-weight: 500; }
  .kpi h3{ margin-top:8px; font-size:22px; font-weight:700; color:var(--text-main); }
  
  @media(max-width:1100px){ .content-grid{ grid-template-columns:1fr; } .summary{ position: static; } }
  @media(max-width:768px){ 
    .app{ grid-template-columns:1fr; } 
    .sidebar{ display:none; } 
    .main{ padding: 20px; }
    .topbar { flex-direction: column; align-items: flex-start; gap: 20px; }
    .context-bar { width: 100%; flex-wrap: wrap; }
    .context-bar select, .context-bar input, .save-btn { flex: 1; }
    .form-grid{ grid-template-columns:1fr; } 
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">LALIZA</div>
    <div class="nav">
      <button class="nav-btn active" data-module="revenue">📊 Daily Revenue</button>
      <button class="nav-btn" data-module="confirm">☎️ Confirm Tracking</button>
      <button class="nav-btn" data-module="doctor">👨‍⚕️ Doctor Finance</button>
      <button class="nav-btn" data-module="billing">🧾 Billing KPI</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="header-left">
        <small>Operations Portal</small>
        <h1 id="pageTitle">Daily Revenue</h1>
      </div>
      
      <div class="context-bar">
        <select id="globalBranch">
          <option value="BKK">BKK - กรุงเทพ</option>
          <option value="CNX">CNX - เชียงใหม่</option>
        </select>
        <input type="date" id="globalDate" />
        <button class="save-btn" id="btnSave">Save Report</button>
      </div>
    </div>

    <div class="content-grid">
      <div class="card">
        <div class="card-title" id="formTitle">Data Entry</div>
        <div id="moduleForm"></div>
      </div>
      
      <div class="summary">
        <div class="summary-card">
          <div class="summary-label">Live Preview</div>
          <div class="summary-value" id="previewMain">฿0.00</div>
          <div class="summary-sub" id="previewSub">Real-time summary calculation</div>
        </div>
        <div class="kpi-grid" id="kpiGrid"></div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ⚠️ วาง Config จาก Firebase ตรงนี้ ⚠️
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentModule = 'revenue';
  document.getElementById('globalDate').valueAsDate = new Date();

  const toNumber = (value) => (value === '' || value === null || isNaN(Number(value))) ? 0 : Number(value);
  const money = (value) => value.toLocaleString('th-TH', { minimumFractionDigits:2, maximumFractionDigits:2 });
  const getVal = (id) => document.getElementById(id)?.value;

  const navBtns = document.querySelectorAll('.nav-btn');
  navBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      navBtns.forEach(b => b.classList.remove('active'));
      e.currentTarget.classList.add('active');
      currentModule = e.currentTarget.dataset.module;
      loadModule(currentModule);
    });
  });

  function loadModule(module) {
    if (module === 'revenue') renderRevenue();
    else if (module === 'confirm') renderConfirm();
    else if (module === 'doctor') renderDoctor();
    else if (module === 'billing') renderBilling();
  }

  function bindInputs(callback) {
    document.querySelectorAll('#moduleForm input').forEach(input => {
      input.addEventListener('input', callback);
    });
  }

  function renderRevenue() {
    document.getElementById('pageTitle').innerText = 'Daily Revenue';
    document.getElementById('formTitle').innerText = 'Revenue Breakdown';
    document.getElementById('moduleForm').innerHTML = `
      <div class="form-grid">
        <div class="field"><label>หัตถการ (Procedure)</label><input id="rev-procedure" type="number" value="0" /></div>
        <div class="field"><label>ขายยา (Medicine)</label><input id="rev-medicine" type="number" value="0" /></div>
        <div class="field"><label>ทรีทเมนท์ (Treatment)</label><input id="rev-treatment" type="number" value="0" /></div>
        <div class="field"><label>สินค้า (Product)</label><input id="rev-product" type="number" value="0" /></div>
        <div class="field"><label>ระบบสมาชิก (Member)</label><input id="rev-member" type="number" value="0" /></div>
        <div class="field"><label>HD Mall</label><input id="rev-hdmall" type="number" value="0" /></div>
        <div class="field"><label>Gowabi</label><input id="rev-gowabi" type="number" value="0" /></div>
        <div class="field"><label>รายได้อื่นๆ (Other)</label><input id="rev-other" type="number" value="0" /></div>
      </div>
    `;
    bindInputs(updateRevenuePreview);
    updateRevenuePreview();
  }

  function updateRevenuePreview() {
    const total = toNumber(getVal('rev-procedure')) + toNumber(getVal('rev-medicine')) + toNumber(getVal('rev-treatment')) +
                  toNumber(getVal('rev-product')) + toNumber(getVal('rev-member')) + toNumber(getVal('rev-hdmall')) +
                  toNumber(getVal('rev-gowabi')) + toNumber(getVal('rev-other'));
    document.getElementById('previewMain').innerText = `฿${money(total)}`;
    document.getElementById('previewSub').innerText = 'Total Revenue Today';
    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi"><small>Procedure</small><h3>฿${money(toNumber(getVal('rev-procedure')))}</h3></div>
      <div class="kpi"><small>Medicine</small><h3>฿${money(toNumber(getVal('rev-medicine')))}</h3></div>
      <div class="kpi"><small>Treatment</small><h3>฿${money(toNumber(getVal('rev-treatment')))}</h3></div>
      <div class="kpi"><small>Online Partners</small><h3>฿${money(toNumber(getVal('rev-hdmall')) + toNumber(getVal('rev-gowabi')))}</h3></div>
    `;
  }

  function renderConfirm() {
    document.getElementById('pageTitle').innerText = 'Confirm Tracking';
    document.getElementById('formTitle').innerText = 'Call Center Metrics';
    document.getElementById('moduleForm').innerHTML = `
      <div class="form-grid">
        <div class="field"><label>คอนเฟิร์มมา (Confirmed)</label><input id="cf-confirm" type="number" value="0" /></div>
        <div class="field"><label>ขอเลื่อน (Rescheduled)</label><input id="cf-reschedule" type="number" value="0" /></div>
        <div class="field"><label>วอล์คอิน (Walk-in)</label><input id="cf-walkin" type="number" value="0" /></div>
        <div class="field"><label>ไม่รับสาย (No Answer)</label><input id="cf-noanswer" type="number" value="0" /></div>
        <div class="field"><label>โทรทั้งหมด (Total Calls)</label><input id="cf-total" type="number" value="0" /></div>
      </div>
    `;
    bindInputs(updateConfirmPreview);
    updateConfirmPreview();
  }

  function updateConfirmPreview() {
    const confirmed = toNumber(getVal('cf-confirm'));
    const totalcalls = toNumber(getVal('cf-total'));
    const showRate = totalcalls > 0 ? (confirmed / totalcalls) * 100 : 0;
    document.getElementById('previewMain').innerText = `${showRate.toFixed(1)}%`;
    document.getElementById('previewSub').innerText = 'Show Rate Conversion';
    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi"><small>Confirmed</small><h3>${confirmed}</h3></div>
      <div class="kpi"><small>Total Calls</small><h3>${totalcalls}</h3></div>
      <div class="kpi"><small>Walk-in Total</small><h3>${toNumber(getVal('cf-walkin'))}</h3></div>
      <div class="kpi"><small>Missed / No Answer</small><h3>${toNumber(getVal('cf-noanswer'))}</h3></div>
    `;
  }

  function renderDoctor() {
    document.getElementById('pageTitle').innerText = 'Doctor Finance';
    document.getElementById('formTitle').innerText = 'DF Settlement Entry';
    document.getElementById('moduleForm').innerHTML = `
      <div class="form-grid">
        <div class="field"><label>รหัสแพทย์ (Doctor ID)</label><input id="doc-id" type="text" placeholder="e.g. DOC-001" /></div>
        <div class="field"><label>ยอดขาย (Sales Revenue)</label><input id="doc-revenue" type="number" value="0" /></div>
        <div class="field"><label>ค่าแพทย์ (DF Amount)</label><input id="doc-df" type="number" value="0" /></div>
        <div class="field"><label>เวลาเข้างาน (Check-in)</label><input id="doc-start" type="time" /></div>
        <div class="field"><label>เวลาออกงาน (Check-out)</label><input id="doc-end" type="time" /></div>
        <div class="field"><label>หมายเหตุ (Remarks)</label><input id="doc-note" type="text" placeholder="Optional notes..." /></div>
      </div>
    `;
    bindInputs(updateDoctorPreview);
    updateDoctorPreview();
  }

  function updateDoctorPreview() {
    const df = toNumber(getVal('doc-df'));
    document.getElementById('previewMain').innerText = `฿${money(df)}`;
    document.getElementById('previewSub').innerText = 'Total DF Allocated';
    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi"><small>Generated Revenue</small><h3>฿${money(toNumber(getVal('doc-revenue')))}</h3></div>
      <div class="kpi"><small>Doctor DF</small><h3>฿${money(df)}</h3></div>
    `;
  }

  function renderBilling() {
    document.getElementById('pageTitle').innerText = 'Billing KPI';
    document.getElementById('formTitle').innerText = 'Operations Productivity';
    document.getElementById('moduleForm').innerHTML = `
      <div class="form-grid">
        <div class="field"><label>จำนวนบิลที่เปิด (Total Bills)</label><input id="bill-count" type="number" value="0" /></div>
        <div class="field"><label>หมายเหตุ (Remarks)</label><input id="bill-note" type="text" placeholder="Optional notes..." /></div>
      </div>
    `;
    bindInputs(updateBillingPreview);
    updateBillingPreview();
  }

  function updateBillingPreview() {
    const bills = toNumber(getVal('bill-count'));
    document.getElementById('previewMain').innerText = bills;
    document.getElementById('previewSub').innerText = 'Total Invoices Today';
    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi"><small>Processed Bills</small><h3>${bills}</h3></div>
    `;
  }

  document.getElementById('btnSave').addEventListener('click', async () => {
    const branchId = getVal('globalBranch');
    const rawDate = getVal('globalDate');
    
    if(!rawDate) return alert('Please select a date before saving.');
    
    const dateStr = rawDate.replace(/-/g, ''); 
    const saveBtn = document.getElementById('btnSave');
    saveBtn.innerText = 'Saving...';
    saveBtn.disabled = true;

    try {
      if (currentModule === 'revenue') {
        const docId = `${branchId}_${dateStr}`;
        await setDoc(doc(db, "dailyOperations", docId), {
          branchId, reportDate: rawDate,
          revenue: {
            procedure: toNumber(getVal('rev-procedure')), medicine: toNumber(getVal('rev-medicine')),
            treatment: toNumber(getVal('rev-treatment')), product: toNumber(getVal('rev-product')),
            member: toNumber(getVal('rev-member')), hdMall: toNumber(getVal('rev-hdmall')),
            gowabi: toNumber(getVal('rev-gowabi')), other: toNumber(getVal('rev-other'))
          },
          createdAt: serverTimestamp(), updatedAt: serverTimestamp()
        }, { merge: true });

      } else if (currentModule === 'confirm') {
        const docId = `${branchId}_${dateStr}`;
        await setDoc(doc(db, "confirmReports", docId), {
          branchId, reportDate: rawDate,
          metrics: {
            confirmed: toNumber(getVal('cf-confirm')), rescheduled: toNumber(getVal('cf-reschedule')),
            walkIn: toNumber(getVal('cf-walkin')), noAnswer: toNumber(getVal('cf-noanswer')),
            totalCalls: toNumber(getVal('cf-total'))
          },
          createdAt: serverTimestamp(), updatedAt: serverTimestamp()
        }, { merge: true });

      } else if (currentModule === 'doctor') {
        const dId = getVal('doc-id').trim() || "UNKNOWN";
        const docId = `${dId}_${branchId}_${dateStr}`;
        await setDoc(doc(db, "doctorFinance", docId), {
          doctorId: dId, branchId, reportDate: rawDate,
          shift: { checkIn: getVal('doc-start') || "", checkOut: getVal('doc-end') || "" },
          finance: { sales: toNumber(getVal('doc-revenue')), df: toNumber(getVal('doc-df')) },
          note: getVal('doc-note') || "",
          createdAt: serverTimestamp(), updatedAt: serverTimestamp()
        }, { merge: true });

      } else if (currentModule === 'billing') {
        const docId = `${branchId}_${dateStr}`;
        await setDoc(doc(db, "billingKPI", docId), {
          branchId, reportDate: rawDate,
          totalBills: toNumber(getVal('bill-count')), note: getVal('bill-note') || "",
          createdAt: serverTimestamp(), updatedAt: serverTimestamp()
        }, { merge: true });
      }
      
      alert(`✅ Data saved successfully for [${currentModule}]`);
    } catch (error) {
      console.error("Save Error: ", error);
      alert("❌ Failed to save data. Please check connection and permissions.");
    } finally {
      saveBtn.innerText = 'Save Report';
      saveBtn.disabled = false;
    }
  });

  loadModule('revenue');
</script>
</body>
</html>
